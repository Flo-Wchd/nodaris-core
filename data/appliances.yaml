# ============================================================================
#   FICHIER   : appliances.yaml
#   OBJET     : Catalogue des appareils sanitaires / points de puisage
#   VERSION   : 1.0
#   FORMAT    : Compatible avec moteur Python orienté objet
# ============================================================================

metadata:
  source: "Catalogue interne BE - appareils sanitaire/points de puisage"
  description: >
    Catalogue des appareils raccordés aux réseaux EFS/ECS/EU/EV/EUV, utilisé
    pour le dimensionnement des débits et diamètres (DTU 60.11)
  version: 1.0
  last_update: "2025-12-02"
  author: "Florian Marchand"
  notes: >
    Les débits unitaires et coefficients sont des valeurs de calcul issues
    des pratiques BE et/ou des normes. Les règles de simultanéité globales
    restent définies dans un autre fichier de règles.

units:
  flow: "l/s"
  diameter: "mm"

fluids:
  EFS:
    label: "Eau froide sanitaire"
  ECS:
    label: "Eau chaude sanitaire"
  EU:
    label: "Eau usée"
  EV:
    label: "Eau vanne"
  EUV:
    label: "Eau usée + eau vanne"
  EP:
    label: "Eau pluviale"

# ----------------------------------------------------------------------------
#   APPAREILS
#   Clé = acronyme utilisé dans le moteur
# ----------------------------------------------------------------------------

