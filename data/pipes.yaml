# ============================================================================
#   FICHIER : pipes.yaml
#   OBJET   : Définition professionnelle des tubes pour le moteur
#   VERSION : 1.0
#   FORMAT : Compatible avec moteur Python orienté objet
# ============================================================================

metadata:
  source: "Catalogues interne BE - tuyauteries"
  description: "Catalogue professionnel des tubes pour réseaux de fluide"
  version: 1.0
  last_update: "2025-12-02"
  author: "Florian Marchand"
  notes: >
    Catalogue des tubes utilisables dans le moteur NDC.
    Ce fichier ne contient que les caractéristiques physiques et commerciales
    des conduites. Les limites normatives (vitesses, pentes, etc.) sont
    définies dans un autre fichier de règles.

units:
  length: "mm"
  diameter: "mm"
  roughness: "mm"
  pressure: "bar"
  temperature: "°C"

fluids:
  EFS:
    label: "Eau froide sanitaire"
  ECS:
    label: "Eau chaude sanitaire"
  CH:
    label: "Chauffage (eau)"
  EU:
    label: "Eaux usées"
  EV:
    label: "Eaux vannes"
  EUV:
    label: "Eaux usées + eaux vannes"
  EP:
    label: "Eaux pluviales"

# ----------------------------------------------------------------------------
#   FAMILLES DE TUBES
# ----------------------------------------------------------------------------

