  - id: "PVC_P_PN25"
    label: "PVC-U pression (PN25)"
    material: "pvc"
    category: "pressure"
    standards:
      - "NF EN 1452-2 (indice de classement T54016)"

    design_defaults:
      roughness_mm: 0.0015
      thermal_conductivity_w_mk: 0.16
      max_pressure_bar: 25
      min_temperature_c: null
      max_temperature_c: 25
      usages:
        - "EFS"
        - "EU"
        - "EV"
        - "EUV"
        - "EP"

    cad:
      default_layer_suffix: "PVC_P"
      default_color_index: 7
      linetype: "CONTINUOUS"

    variants:
