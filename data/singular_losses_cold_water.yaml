# ============================================================================
#   FICHIER : singular_losses_cold_water.yaml
#   OBJET   : Définition des coefficients de perte de charge singulière (ζ)
#   VERSION : 1.0
#   FORMAT  : Compatible avec moteur Python orienté objet
# ============================================================================

metadata:
  source: "Catalogues interne BE - pertes de charge singulière (ζ)"
  description: >
    Catalogue professionnel des coefficients de perte de charge singulière (ζ)
    pour réseaux d'eau froide sanitaire (EFS).
  version: "1.0"
  last_update: "2025-12-05"
  author: "Florian Marchand"
  notes: >
    Coefficients de pertes de charge singulières (ζ, sans dimension) pour les
    réseaux de fluides du bâtiment.

fluid: "cold_water"

units:
  k: "-"
  kv: "m³/h @ 1 bar"
  diameter: "mm"

references:
  - id: "PROCESSS_FREE"
    label: "Processs - coefficients de pertes de charge"
    url: "http://processs.free.fr/page/coefficients-perte-charge/0906"

  - id: "GIRPI_PVCU"
    label: "GIRPI PVC-U - gamme vannes à bille"
    url: "chrome-extension://efaidnbmnnnibpcajpcglclefindmkaj/https://static.mypum.fr/DAM/public/var/assets/Fournisseurs/GIRPI/Tech-normes/yp-ft-dt-gamme_pvc-u__e122015_.pdf"
    note: "Kv page 49 du PDF"


# ============================================================================
# 1) ACCESSOIRES A COEFFICIENT K
# ============================================================================

k_catalog:

  elbows:
    family: "elbow"
    description: "Coudes EF"
    items:
      - id: "elbow_90_standard"
        label: "Coude 90° standard"
        angle_deg: 90.0
        radius_type: "standard"
        k: 1.70
        source: ""
        note: "Valeur moyenne pour coude moulé EF"
        applicability:
          diameter_min_mm: 12
          diameter_max_mm: 100

      - id: "elbow_45_standard"
        label: "Coude 45° standard"
        angle_deg: 45.0
        radius_type: "standard"
        k: 0.80
        source: ""

  tees:
    family: "tee"
    description: "Tés EF"
    items:
      - id: "tee_through"
        label: "Té - passage droit"
        flow_path: "straight"
        k: 0.20
        source: ""

      - id: "tee_branch"
        label: "Té - piquage 90°"
        flow_path: "branch"
        k: 1.00
        source: ""

      - id: "tee_derivation"
        label: "Té - dérivation"
        flow_path: "derivation"
        k: 3.00
        source: ""

  reducers:
    family: "reducer"
    description: "Réductions / élargissements"
    items:
      - id: "sudden_reducer"
        label: "Réduction brusque"
        model: "beta_dependent"
        # K dépend de β = D2 / D1 (D1 amont, D2 aval).
        k_table:
          - beta: 0.9
            k: 0.10
          - beta: 0.8
            k: 0.18
          - beta: 0.75
            k: 0.22
          - beta: 0.67
            k: 0.28
          - beta: 0.5
            k: 0.38
        source: ""

      - id: "sudden_enlargement"
        label: "Élargissement brusque"
        model: "formula"
        formula: "k = (1 - beta^2)^2"
        source: ""


# ============================================================================
# 2) ELEMENTS MODELISES PAR Kv
# ============================================================================

kv_catalog:

  ball_valves_pvcu:
    family: "ball_valve"
    description: "Vannes à bille PVC-U"
    manufacturer: "GIRPI"
    reference: "GIRPI_PVCU"
    items:
      - id: "girpi_ball_valve_pn16_full_bore"
        label: "Vanne à bille - passage intégral"
        position: "full_open"
        note: "Kv d'après documentation GIRPI, passage intégral"
        dn_kv:
          DN15: 70
          DN20: 190
          DN25: 350
          DN32: 700
          DN40: 1000
          DN50: 1650
          DN63: 3100
        comment: >
          Utiliser la relation ΔP = (Q / Kv)^2 * (ρ / (2*g))
          pour convertir en perte de charge équivalente.


# ============================================================================
# 3) MECANISME DE MAPPING COTE CALCUL
# ============================================================================

mappings:

  by_keywords:
    "coude_90": "elbow_90_standard"
    "coude_45": "elbow_45_standard"
    "te_droit": "tee_through"
    "te_piquage": "tee_branch"
    "te_derivation": "tee_derivation"
    "vanne_bille_pvc": "girpi_ball_valve_pn16_full_bore"